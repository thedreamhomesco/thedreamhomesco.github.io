<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dream Homes Co. & Company</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #efe7dc;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
    }

    .site-wrap {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      background: #efe7dc;
      box-shadow: 0 0 40px rgba(0,0,0,0.18);
    }

    .mockup {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Invisible clickable phone area over the footer phone number */
    .phone-link {
      position: absolute;
      left: 31%;
      right: 31%;
      bottom: 4.9%;
      height: 1.7%;
      z-index: 10;
      display: block;
      text-indent: -9999px;
      overflow: hidden;
    }

    @media (min-width: 431px) {
      body {
        display: flex;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="site-wrap">
    <img class="mockup" src="final-landing-page.jpeg" alt="The Dream Homes Co. & Company landing page" />
    <a class="phone-link" href="tel:14706702995" aria-label="Call The Dream Homes Co. & Company at 470-670-2995">
      470-670-2995
    </a>
  </main>
</body>
</html>
